services:

  vault:
    command: vault server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

  vault-init:
    image: hashicorp/vault:1.17
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      DATA_SOURCE_URL: ${DATA_SOURCE_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_GATEWAY_CLIENT_ID: ${KEYCLOAK_GATEWAY_CLIENT_ID}
    volumes:
      - ./scripts/vault-init.sh:/vault-init.sh:ro
    entrypoint: [ "sh", "/vault-init.sh" ]
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    networks:
      - pet-adoption-network

  keycloak:
    command: start-dev --import-realm
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8180:8080"

  keycloak-init:
    image: curlimages/curl:8.7.1
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./scripts/keycloak-init.sh:/keycloak-init.sh:ro
    entrypoint: [ "sh", "/keycloak-init.sh" ]
    depends_on:
      keycloak:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - pet-adoption-network
